<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Firefox Relay 一鍵清除 Masks</title>
<style>
  body {
    font-family: Arial;
    background: #0f172a;
    color: #e2e8f0;
    text-align: center;
    padding: 40px;
  }
  input {
    width: 320px;
    padding: 10px;
    margin: 10px;
    border-radius: 8px;
    border: none;
  }
  button {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: #ef4444;
    color: white;
    font-size: 16px;
    cursor: pointer;
  }
  button:hover {
    background: #dc2626;
  }
  #log {
    margin-top: 20px;
    text-align: left;
    max-width: 600px;
    margin-inline: auto;
    background: #020617;
    padding: 15px;
    border-radius: 10px;
    height: 300px;
    overflow: auto;
    font-size: 13px;
  }
  .progress {
    margin-top: 15px;
  }
</style>
</head>
<body>

<h2>🔥 Firefox Relay 一鍵清除 Masks</h2>

<input type="password" id="apiKey" placeholder="輸入你的 API Key"><br>

<button onclick="startDelete()">一鍵清空全部 Masks</button>

<div class="progress" id="progress"></div>

<div id="log"></div>

<script>
function log(msg) {
  const el = document.getElementById("log");
  el.innerHTML += msg + "<br>";
  el.scrollTop = el.scrollHeight;
}

async function startDelete() {
  const apiKey = document.getElementById("apiKey").value.trim();

  if (!apiKey) {
    alert("請輸入 API Key");
    return;
  }

  if (!confirm("⚠️ 確定要刪除所有 masks？此操作不可恢復！")) {
    return;
  }

  log("🚀 開始取得 masks...");

  try {
    const res = await fetch("https://relay.firefox.com/api/v1/relayaddresses/", {
      headers: {
        "Authorization": `Bearer ${apiKey}`
      }
    });

    const data = await res.json();

    const total = data.results.length;
    log(`📦 找到 ${total} 個 masks`);

    let count = 0;

    for (const mask of data.results) {
      await fetch(`https://relay.firefox.com/api/v1/relayaddresses/${mask.id}/`, {
        method: "DELETE",
        headers: {
          "Authorization": `Bearer ${apiKey}`
        }
      });

      count++;
      log(`❌ 刪除: ${mask.full_address}`);

      document.getElementById("progress").innerText =
        `進度: ${count} / ${total}`;
    }

    log("✅ 全部刪除完成！");
    document.getElementById("progress").innerText = "完成 🎉";

  } catch (err) {
    log("❗ 發生錯誤：" + err);
  }
}
</script>

</body>
</html>
