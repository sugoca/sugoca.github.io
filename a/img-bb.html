<!DOCTYPE html>
<html lang="utf-8">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>imgbb bed</title>
<style>
        body {
            max-width: 650px;
            /* 1. 移除原本的 40px 上下外距，改為左右自動置中 */
            margin: 0 auto; 
            padding: 20px;
            background-color: #f8f9fa;
            color: #333;

            /* 2. 核心：啟用 Flexbox 佈局達成上下左右置中 */
            display: flex;
            flex-direction: column;   /* 讓裡面的元件（h2, dropZone等）維持從上到下排列 */
            justify-content: center;  /* 垂直置中 */
            align-items: stretch;     /* 讓裡面的元件寬度填滿 max-width */
            min-height: 100vh;        /* 讓畫面的基礎高度等於瀏覽器視窗高度 */
            box-sizing: border-box;   /* 防止 padding 撐破 100vh 導致出現滾動條 */
        }
        h2 {
            text-align: center;
            color: #222;
            margin-bottom: 25px;
        }
        /* 拖曳與選擇區域 */
        #dropZone {
            border: 2px dashed #007BFF;
            border-radius: 12px;
            background-color: #fff;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        #dropZone.dragover {
            background-color: #e8f0fe;
            border-color: #0056b3;
            transform: scale(1.02);
        }
        #dropZone p {
            margin: 0 0 10px 0;
            font-size: 1.1rem;
            color: #495057;
        }
        #dropZone span {
            font-size: 0.9rem;
            color: #6c757d;
        }
        #fileInput {
            display: none;
        }
        /* 列表容器 */
        #uploadList {
            margin-top: 30px;
        }
        /* 單個檔案上傳項目樣式 */
        .upload-item {
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        .file-name {
            font-weight: bold;
            color: #495057;
            max-width: 70%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .status-text {
            font-weight: 500;
        }
        .status-uploading { color: #fd7e14; }
        .status-success { color: #28a745; }
        .status-error { color: #dc3545; }
        
        /* 成功後的連結與複製按鈕區塊 */
        .result-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f1f3f5;
            padding: 8px 12px;
            border-radius: 6px;
            margin-top: 8px;
        }
        .url-text {
            flex: 1;
            font-family: monospace;
            font-size: 0.85rem;
            color: #1c7ed6;
            word-break: break-all;
            user-select: all;
        }
        .copy-btn {
            background-color: #212529;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            white-space: nowrap;
            transition: background 0.15s;
        }
        .copy-btn:hover {
            background-color: #495057;
        }
        .copy-btn.copied {
            background-color: #28a745;
        }
    </style>
</head>
<body>

    <div id="dropZone">
        <input type="file" id="fileInput" accept="image/*" multiple>
    </div>

    <div id="uploadList"></div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const uploadList = document.getElementById('uploadList');
        const API_KEY = '0c999cd1c0a5ca788495f605ea890d19';

        // 觸發選擇檔案視窗
        dropZone.addEventListener('click', () => fileInput.click());

        // 監聽檔案選擇
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
            fileInput.value = ''; // 清空，讓同一張圖可重複觸發
        });

        // 處理拖曳視覺效果
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        // 批次處理檔案
        function handleFiles(files) {
            Array.from(files).forEach(file => {
                if (!file.type.startsWith('image/')) return; // 只允許圖片
                uploadFile(file);
            });
        }

        // 執行單一檔案上傳
        async function uploadFile(file) {
            // 1. 建立 UI 節點
            const item = document.createElement('div');
            item.className = 'upload-item';
            
            item.innerHTML = `
                <div class="item-header">
                    <span class="file-name">${file.name}</span>
                    <span class="status-text status-uploading">上傳中...</span>
                </div>
            `;
            uploadList.insertBefore(item, uploadList.firstChild); // 最新上傳的排在最前面

            const statusText = item.querySelector('.status-text');

            // 2. 封裝 FormData
            const formData = new FormData();
            formData.append('key', API_KEY);
            formData.append('image', file);

            try {
                const response = await fetch('https://api.imgbb.com/1/upload', {
                    method: 'POST',
                    body: formData
                });

                const json = await response.json();

                if (response.ok && json.success && json.data) {
                    // 3. 精準抓取原圖連結：json.data.url
                    const originalUrl = json.data.url;

                    statusText.textContent = '成功';
                    statusText.className = 'status-text status-success';

                    // 4. 生成包含 COPY 按鈕的區塊
                    const resultBox = document.createElement('div');
                    resultBox.className = 'result-box';
                    resultBox.innerHTML = `
                        <div class="url-text">${originalUrl}</div>
                        <button class="copy-btn">COPY</button>
                    `;
                    item.appendChild(resultBox);

                    // 5. 綁定 COPY 功能
                    const copyBtn = resultBox.querySelector('.copy-btn');
                    copyBtn.addEventListener('click', () => {
                        navigator.clipboard.writeText(originalUrl).then(() => {
                            copyBtn.textContent = '已複製！';
                            copyBtn.classList.add('copied');
                            setTimeout(() => {
                                copyBtn.textContent = 'COPY';
                                copyBtn.classList.remove('copied');
                            }, 2000);
                        }).catch(err => {
                            alert('複製失敗，瀏覽器可能不支援，請手動全選複製。');
                        });
                    });

                } else {
                    statusText.textContent = '失敗';
                    statusText.className = 'status-text status-error';
                    const errorMsg = document.createElement('div');
                    errorMsg.style.cssText = 'color:#dc3545; font-size:0.8rem; margin-top:5px;';
                    errorMsg.textContent = json.error ? json.error.message : '未知錯誤';
                    item.appendChild(errorMsg);
                }

            } catch (error) {
                console.error(error);
                statusText.textContent = '網路錯誤';
                statusText.className = 'status-text status-error';
            }
        }
    </script>

</body>
</html>
